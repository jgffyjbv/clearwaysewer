<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Thank You | Clear Way Sewer &amp; Drain</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0a1f38" />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .thanks-wrap { min-height: 100vh; display: grid; place-items: center; background: var(--grad-navy); color: #fff; text-align: center; padding: 40px 22px; position: relative; overflow: hidden; }
    .thanks-wrap::before { content:""; position:absolute; width:520px;height:520px; top:-160px; right:-120px; border-radius:50%; background: radial-gradient(circle, rgba(44,119,240,.45), transparent 70%); filter: blur(60px); }
    .thanks-card { position: relative; z-index: 2; max-width: 560px; }
    .thanks-check { width: 92px; height: 92px; margin: 0 auto 24px; border-radius: 50%; background: var(--grad-cta); display: grid; place-items: center; box-shadow: var(--shadow-blue); }
    .thanks-check svg { width: 46px; height: 46px; color: #fff; }
    .thanks-card h1 { color: #fff; font-size: clamp(2rem, 5vw, 3rem); }
    .thanks-card p { color: rgba(255,255,255,.82); font-size: 1.1rem; margin-bottom: 28px; }
    .thanks-actions { display:flex; gap: 14px; justify-content:center; flex-wrap:wrap; }
    .thanks-logo { display:inline-flex; flex-direction:column; align-items:center; margin-bottom: 34px; }
  </style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-card">
      <a href="index.html" class="logo thanks-logo" aria-label="Clear Way Sewer and Drain — home">
        <span class="logo-row"><span class="logo-clear">CLEAR</span><span class="logo-way">WAY</span></span>
        <span class="logo-sub">Sewer &amp; Drain</span>
      </a>
      <div class="thanks-check">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h1>Request Received!</h1>
      <p>Thanks for reaching out to Clear Way Sewer &amp; Drain. We've got your request and will be in touch shortly. Need help right now? Give us a call.</p>
      <div class="thanks-actions">
        <a href="tel:+18456900020" class="btn btn-primary btn-lg">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          (845) 690-0020
        </a>
        <a href="index.html" class="btn btn-ghost btn-lg">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
